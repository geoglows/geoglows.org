# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
backend:
  name: github
  repo: geoglows/geoglows.org
  branch: main
  base_url: https://geoglowsorg.vercel.app # this deployment's own origin (update if a custom domain is added)
  auth_endpoint: api/auth

# Lets editors run the admin against local files during development:
#   npx @sveltia/cms-proxy-server  (then open http://localhost:4321/admin/)
local_backend: true

media_folder: public/media
public_folder: /media

collections:
  - name: settings
    label: Site Settings
    files:
      - name: site
        label: Site
        file: src/content/settings/site.json
        fields:
          - { label: Brand name, name: brandName, widget: string }
          - { label: Tagline, name: tagline, widget: string }
          - label: Navigation
            name: nav
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Link, name: href, widget: string }
              - label: Dropdown items
                name: children
                widget: list
                required: false
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
          - label: Header button
            name: navCta
            widget: object
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Link, name: href, widget: string }
          - label: Events ticker
            name: ticker
            widget: list
            required: false
            fields:
              - { label: Date, name: date, widget: string }
              - { label: Text, name: text, widget: string }
          - { label: Footer blurb, name: footerBlurb, widget: text }
          - label: Footer columns
            name: footerColumns
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - label: Links
                name: links
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
          - label: Footer legal links
            name: footerLegal
            widget: list
            required: false
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Link, name: href, widget: string }

  - name: pages
    label: Pages
    label_singular: Page
    folder: src/content/pages
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: title
    fields:
      - { label: Title, name: title, widget: string }
      - label: Blocks
        name: blocks
        widget: list
        types:
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading (lead), name: headingLead, widget: string }
              - { label: Heading (emphasis), name: headingEmphasis, widget: string, required: false }
              - { label: Subtitle, name: subtitle, widget: text, required: false }
              - { label: Background image, name: image, widget: image, required: false }
              - label: Buttons
                name: ctas
                widget: list
                required: false
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
                  - { label: Style, name: style, widget: select, options: [amber, white, outline, navy, green], default: amber }
              - label: Featured card
                name: featured
                widget: object
                required: false
                fields:
                  - { label: Tag, name: tag, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Text, name: text, widget: text }
                  - { label: Link, name: href, widget: string }
          - label: Stat band
            name: statBand
            widget: object
            fields:
              - label: Stats
                name: stats
                widget: list
                fields:
                  - { label: Value, name: value, widget: string }
                  - { label: Label, name: label, widget: string }
          - label: Coverage circles
            name: coverage
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Intro, name: intro, widget: text, required: false }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Image, name: image, widget: image }
                  - { label: Title, name: title, widget: string }
                  - { label: Text, name: text, widget: string }
              - label: Button
                name: cta
                widget: object
                required: false
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
          - label: Impact stories
            name: impactStories
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Intro, name: intro, widget: text, required: false }
              - label: Stories
                name: stories
                widget: list
                fields:
                  - { label: Image, name: image, widget: image }
                  - { label: Location, name: location, widget: string }
                  - { label: Title, name: title, widget: string }
                  - { label: Link, name: href, widget: string }
              - label: Button
                name: cta
                widget: object
                required: false
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
          - label: Value props
            name: valueProps
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Text, name: text, widget: text }
              - label: Button
                name: cta
                widget: object
                required: false
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
          - label: Use cases
            name: useCases
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Icon, name: icon, widget: select, options: [layers, globe, partners, waves, drop, bars, flood, capacity] }
                  - { label: Title, name: title, widget: string }
                  - { label: Text, name: text, widget: text }
          - label: Testimonials
            name: testimonials
            widget: object
            fields:
              - label: Quotes
                name: quotes
                widget: list
                fields:
                  - { label: Quote, name: quote, widget: text }
                  - { label: Name, name: name, widget: string }
                  - { label: Role, name: role, widget: string }
                  - { label: Initials, name: initials, widget: string }
          - label: Partners
            name: partners
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - label: Logos
                name: logos
                widget: list
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Logo image, name: image, widget: image, required: false, hint: "Leave blank to show the name as text." }
                  - { label: Link, name: url, widget: string, required: false }
              - label: Button
                name: cta
                widget: object
                required: false
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
              - { label: Anchor ID, name: anchor, widget: string, required: false, hint: "Optional id for deep-linking, e.g. partners." }
          - label: How it works
            name: howItWorks
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - label: Steps
                name: steps
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Text, name: text, widget: text }
          - label: Newsletter
            name: newsletter
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Text, name: text, widget: text, required: false }
              - { label: Button label, name: buttonLabel, widget: string, default: Subscribe }
          - label: Closing CTA
            name: closingCta
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - label: Buttons
                name: ctas
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
                  - { label: Style, name: style, widget: select, options: [amber, white, outline, navy, green], default: amber }
          - label: News grid
            name: newsGrid
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Count, name: count, widget: number, default: 3 }
              - label: Button
                name: cta
                widget: object
                required: false
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
          - label: Rich text
            name: richText
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string, required: false }
              - { label: Body, name: body, widget: markdown }
              - { label: Background, name: background, widget: select, options: [page, muted], default: page }
              - { label: Anchor ID, name: anchor, widget: string, required: false, hint: "Optional id for deep-linking, e.g. data." }
          - label: Tools grid
            name: toolsGrid
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Intro, name: intro, widget: text, required: false }
              - { label: Category filter, name: category, widget: string, required: false, hint: "Leave blank to show all tools." }
              - { label: Limit, name: limit, widget: number, required: false, hint: "Max tools to show (e.g. 6 for a home preview). Blank shows all." }
              - label: Button
                name: cta
                widget: object
                required: false
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Link, name: href, widget: string }
          - label: People grid
            name: peopleGrid
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Group filter, name: group, widget: string, required: false, hint: "e.g. Project leaders, Steering committee, Collaborators" }
              - { label: Anchor ID, name: anchor, widget: string, required: false, hint: "Optional id for deep-linking, e.g. team." }
          - label: Working groups
            name: workingGroups
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Anchor ID, name: anchor, widget: string, required: false, hint: "Optional id for deep-linking, e.g. working-groups." }

  - name: tools
    label: Tools
    label_singular: Tool
    folder: src/content/tools
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: name
    sortable_fields: [order, name]
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Tagline, name: tagline, widget: string }
      - { label: Category, name: category, widget: select, options: [Forecasting, Groundwater, Analysis, Mapping], default: Analysis }
      - { label: Icon, name: icon, widget: select, options: [layers, globe, partners, waves, drop, bars, flood, capacity], default: globe }
      - { label: Image, name: image, widget: image, required: false }
      - { label: App URL, name: appUrl, widget: string, required: false }
      - { label: Order, name: order, widget: number, default: 0, value_type: int }
      - { label: Description, name: body, widget: markdown }

  - name: people
    label: People
    label_singular: Person
    folder: src/content/people
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: name
    sortable_fields: [group, order, name]
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Title, name: title, widget: string, required: false }
      - { label: Organization, name: organization, widget: string, required: false }
      - { label: Country, name: country, widget: string, required: false }
      - { label: Groups, name: groups, widget: select, multiple: true, options: [Project leaders, Steering committee, Collaborators, Technical team], default: [Project leaders] }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: LinkedIn URL, name: linkedin, widget: string, required: false }
      - { label: Website URL, name: website, widget: string, required: false }
      - { label: Email, name: email, widget: string, required: false }
      - { label: ORCID URL, name: orcid, widget: string, required: false }
      - { label: Order, name: order, widget: number, default: 0, value_type: int }
      - { label: Bio, name: body, widget: markdown }

  - name: working-groups
    label: Working Groups
    label_singular: Working Group
    folder: src/content/working-groups
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: title
    sortable_fields: [order, number]
    fields:
      - { label: Number, name: number, widget: number, value_type: int }
      - { label: Title, name: title, widget: string }
      - { label: Summary, name: summary, widget: text }
      - { label: Order, name: order, widget: number, default: 0, value_type: int }

  - name: videos
    label: Videos
    label_singular: Video
    folder: src/content/videos
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: title
    sortable_fields: [order, title]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: YouTube video ID, name: youtubeId, widget: string, hint: "The id after watch?v= in the YouTube URL." }
      - { label: Order, name: order, widget: number, default: 0, value_type: int }

  - name: webinars
    label: Webinars
    label_singular: Webinar
    folder: src/content/webinars
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: title
    sortable_fields: [order, title]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: string, hint: "e.g. 21 October 2025" }
      - { label: YouTube video ID, name: youtubeId, widget: string, hint: "The id after watch?v= in the YouTube URL." }
      - { label: Presenter, name: presenter, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Order, name: order, widget: number, default: 0, value_type: int }

  - name: news
    label: News & Events
    label_singular: News item
    folder: src/content/news
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: title
    sortable_fields: [date, title]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, time_format: false }
      - { label: LinkedIn / source URL, name: url, widget: string }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Tag, name: tag, widget: select, options: [News, Release, Training, Research, Event], default: News }

  - name: social
    label: Social posts
    label_singular: Social post
    folder: src/content/social
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: title
    sortable_fields: [date, title]
    fields:
      - { label: Title, name: title, widget: string, hint: "A short headline for the post card." }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, time_format: false }
      - { label: Post URL, name: url, widget: string, hint: "The permalink to the LinkedIn post (open the post, click ... > Copy link to post)." }
      - { label: Excerpt, name: excerpt, widget: text, hint: "A one or two sentence summary shown on the card." }
      - { label: Image, name: image, widget: image, required: false, hint: "A screenshot or image from the post." }
      - { label: Tag, name: tag, widget: string, default: LinkedIn }

  - name: legal
    label: Legal pages
    label_singular: Legal page
    folder: src/content/legal
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: title
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Last updated, name: updated, widget: string, hint: "e.g. 19 July 2026" }
      - { label: Description, name: description, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: publications
    label: Publications
    label_singular: Publication
    folder: src/content/publications
    extension: md
    format: yaml-frontmatter
    create: true
    identifier_field: title
    sortable_fields: [year, title]
    fields:
      - { label: DOI, name: doi, widget: string, required: false, hint: "Paste the DOI, then run scripts/fetch-doi.mjs to auto-fill the rest." }
      - { label: Title, name: title, widget: string }
      - { label: Authors, name: authors, widget: list, field: { label: Author, name: author, widget: string } }
      - { label: Year, name: year, widget: number, value_type: int }
      - { label: Journal, name: journal, widget: string, required: false }
      - { label: URL, name: url, widget: string, required: false }
      - { label: Topics, name: topics, widget: list, field: { label: Topic, name: topic, widget: string } }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Abstract, name: abstract, widget: text, required: false }
